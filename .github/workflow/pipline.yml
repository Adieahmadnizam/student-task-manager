name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-files
          path: .

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Run ESLint
        run: npx eslint .

      - name: Security Check
        run: npm audit

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deployment Message
        run: echo "Build successful - ready for deployment"